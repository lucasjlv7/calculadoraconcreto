<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dosagem ABCP - UFRN</title>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#edf3ff 0%,#f7f9fc 100%);
    margin:0;
    padding:15px;
    color:#1c1c1e;
    max-width:700px;
    margin:auto;
}

.topo{
    display:flex;
    align-items:center;
    gap:14px;
    margin:10px 0 18px;
}

.logo{
    width:62px;
    height:62px;
    border-radius:18px;
    background:#003da5;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    box-shadow:0 8px 20px rgba(0,61,165,0.25);
}

h1{
    margin:0;
    font-size:24px;
    color:#0f172a;
}

.topo p{
    margin:2px 0 0;
    color:#64748b;
    font-size:14px;
}

.card{
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:
        0 10px 25px rgba(0,0,0,0.06),
        0 2px 6px rgba(0,0,0,0.04);
    border:1px solid rgba(255,255,255,0.7);
}

h2{
    font-size:13px;
    color:#003da5;
    text-transform:uppercase;
    border-bottom:2px solid #003da5;
    padding-bottom:5px;
    margin-top:0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

label{
    display:block;
    font-size:11px;
    font-weight:bold;
    color:#64748b;
    margin-top:8px;
}

input,select{
    width:100%;
    padding:13px;
    border-radius:14px;
    border:1px solid #dbe2ea;
    background:#f8fafc;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    background:linear-gradient(135deg,#003da5,#2563eb);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

button:hover{ transform:translateY(-2px); }
button:active{ transform:scale(0.98); }

.res{
    display:none;
    background:linear-gradient(180deg,#eff6ff,#dbeafe);
    border:1px solid #93c5fd;
    border-radius:22px;
}

.line{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid rgba(0,0,0,0.05);
    font-size:14px;
}

.destaque{
    background:white;
    border-radius:14px;
    padding:10px 12px;
    margin:8px 0;
    font-weight:700;
}

b{ color:#003da5; }

hr{
    border:0;
    border-top:1px dashed #93c5fd;
    margin:14px 0;
}

@media(max-width:600px){
    .grid{ grid-template-columns:1fr; }
}

</style>
</head>

<body>

<div class="topo">
<div class="logo">🧱</div>
<div>
<h1>Dosagem ABCP</h1>
<p>Calculadora UFRN • Método ABCP</p>
</div>
</div>

<div class="card">

<h2>1. Critérios e Durabilidade</h2>

<div class="grid">

<div>
<label>Fck (MPa)</label>
<input type="number" id="fck">
</div>

<div>
<label>Controle (Sd)</label>
<select id="sd">
<option value="" selected disabled hidden></option>
<option value="4">Tipo A - 4,0</option>
<option value="5.5">Tipo B - 5,5</option>
<option value="7">Tipo C - 7,0</option>
</select>
</div>

<div>
<label>Classe do Cimento</label>
<select id="classe">
<option value="" selected disabled hidden></option>
<option value="25">25 MPa</option>
<option value="32">32 MPa</option>
<option value="40">40 MPa</option>
</select>
</div>

<div>
<label>Slump Y (mm)</label>
<input type="number" id="y">
</div>

<div>
<label>Dmax (mm)</label>
<select id="dmax">
<option value="" selected disabled hidden></option>
<option value="9.5">9,5</option>
<option value="19">19</option>
<option value="25">25</option>
<option value="38">38</option>
</select>
</div>

</div>
</div>

<div class="card">

<h2>2. Laboratório</h2>

<div class="grid">
<div><label>gc</label><input id="gc"></div>
<div><label>dc</label><input id="dc"></div>
<div><label>g1</label><input id="g1"></div>
<div><label>d1</label><input id="d1"></div>
<div><label>g2</label><input id="g2"></div>
<div><label>d2</label><input id="d2"></div>
<div><label>g concreto</label><input id="gconcreto"></div>
</div>
</div>

<div class="card">

<h2>3. Parâmetros</h2>

<div class="grid">
<div><label>as (%)</label><input id="as"></div>
<div><label>am (%)</label><input id="am"></div>
<div><label>ar (%)</label><input id="ar"></div>
<div><label>h (%)</label><input id="h"></div>
</div>

<label>Peça / Exposição</label>

<div class="grid">
<select id="peca">
<option value="" selected disabled hidden></option>
<option value="delgada">Peça Delgada</option>
<option value="comum">Peça Comum</option>
</select>

<select id="exp">
<option value="" selected disabled hidden></option>
<option value="comum">Ambiente Comum</option>
<option value="agressivo">Ambiente Agressivo</option>
</select>
</div>

</div>

<button onclick="calcular()">CALCULAR DOSAGEM</button>

<div id="resultado" class="card res">

<h2>Resultados</h2>

<div class="line"><span>fc28:</span><b id="r_fc28"></b></div>
<div class="line"><span>a/c:</span><b id="r_x"></b></div>
<div class="line"><span>Água:</span><b id="r_a"></b></div>
<div class="line"><span>Cimento:</span><b id="r_c"></b></div>
<div class="line"><span>gm:</span><b id="r_gm"></b></div>
<div class="line"><span>M:</span><b id="r_M"></b></div>

<hr>

<div class="line"><span>M1:</span><b id="r_M1"></b></div>
<div class="line"><span>M2:</span><b id="r_M2"></b></div>

<div class="line"><span>M1':</span><b id="r_M1c"></b></div>
<div class="line"><span>M2':</span><b id="r_M2c"></b></div>

<div class="line destaque"><span>Mh1':</span><b id="r_Mh1"></b></div>
<div class="line destaque"><span>a':</span><b id="r_acorr"></b></div>

<hr>

<div class="line"><span>Traço Massa:</span><b id="r_tm"></b></div>
<div class="line"><span>Traço Volume:</span><b id="r_tv"></b></div>

</div>

<script>

function arred2(v){
    return Math.round((v + Number.EPSILON) * 100) / 100;
}

function calcular(){

    const fck = parseFloat(document.getElementById('fck').value) || 0;
    const sd = parseFloat(document.getElementById('sd').value) || 0;
    const classe = parseInt(document.getElementById('classe').value) || 0;
    const y = parseFloat(document.getElementById('y').value) || 0;
    const dmax = parseFloat(document.getElementById('dmax').value) || 0;

    const gc = parseFloat(document.getElementById('gc').value) || 0;
    const dc = parseFloat(document.getElementById('dc').value) || 0;
    const g1 = parseFloat(document.getElementById('g1').value) || 0;
    const d1 = parseFloat(document.getElementById('d1').value) || 0;
    const g2 = parseFloat(document.getElementById('g2').value) || 0;
    const d2 = parseFloat(document.getElementById('d2').value) || 0;
    const gconcreto = parseFloat(document.getElementById('gconcreto').value) || 0;

    const as = (parseFloat(document.getElementById('as').value) || 0)/100;
    const am = (parseFloat(document.getElementById('am').value) || 0)/100;
    const ar = (parseFloat(document.getElementById('ar').value) || 0)/100;
    const h = (parseFloat(document.getElementById('h').value) || 0)/100;

    const tabAgua = {
        10:{9.5:183,19:162,25:154,38:143},
        20:{9.5:196,19:173,25:165,38:153},
        30:{9.5:204,19:180,25:172,38:159},
        40:{9.5:210,19:186,25:177,38:164}
    };

    const tabAB = {
        25:{A:17,B:9},
        32:{A:21,B:11},
        40:{A:26,B:14}
    };

    const fc28 = arred2(fck + (1.65 * sd));
    const agua = tabAgua[y]?.[dmax] || 0;

    const A = tabAB[classe]?.A || 0;
    const B = tabAB[classe]?.B || 0;

    const x = A && fc28 ? arred2(A / (fc28 + B)) : 0;
    const c = x ? arred2(agua / x) : 0;

    const M = 100;

    document.getElementById('resultado').style.display='block';

    document.getElementById('r_fc28').innerText = fc28;
    document.getElementById('r_x').innerText = x;
    document.getElementById('r_a').innerText = agua;
    document.getElementById('r_c').innerText = c;
    document.getElementById('r_M').innerText = M;
    document.getElementById('r_M1').innerText = M/2;
    document.getElementById('r_M2').innerText = M/2;
    document.getElementById('r_tm').innerText = `1 : x : y`;
    document.getElementById('r_tv').innerText = `1 : x : y`;
}

</script>

</body>
</html>
